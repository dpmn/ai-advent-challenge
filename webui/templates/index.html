<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis Agent</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <!-- Left sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Jarvis</h2>
        <button id="new-session-btn" title="New session">＋</button>
      </div>
      <div id="session-list"></div>

      <!-- SM Status -->
      <div class="settings-section" id="sm-section" style="display:none">
        <h3>State Machine</h3>
        <div id="sm-status" class="sm-indicator">—</div>
      </div>

      <!-- MCP -->
      <div class="settings-section" id="mcp-section">
        <h3>
          MCP
          <label class="mcp-toggle">
            <input type="checkbox" id="mcp-enabled-checkbox">
            <span class="toggle-track"></span>
            <span id="mcp-enabled-label">off</span>
          </label>
        </h3>
        <div id="mcp-servers-list"></div>
        <div class="mcp-add-form">
          <input type="text" id="mcp-add-name" placeholder="name (e.g. grep-app)">
          <input type="text" id="mcp-add-url" placeholder="https://... or stdio cmd">
          <button id="mcp-add-btn">Add server</button>
        </div>
        <div id="mcp-tools-info" class="mcp-tools-info"></div>
      </div>

      <!-- Settings -->
      <div class="settings-section">
        <h3>Settings</h3>
        <label>Model</label>
        <select id="model-select"></select>

        <label>Temperature</label>
        <div class="slider-row">
          <input type="range" id="temp-slider" min="0" max="2" step="0.05" value="0.7">
          <span id="temp-value">0.70</span>
        </div>

        <label>Max tokens</label>
        <input type="number" id="max-tokens-input" value="2500" min="100" max="16000" step="100">

        <label>Context limit</label>
        <input type="number" id="context-limit-input" value="40000" min="1000" max="200000" step="1000">
      </div>
    </aside>

    <!-- Chat area -->
    <main id="chat-area">
      <div id="chat-topbar">
        <button id="sidebar-toggle">☰</button>
        <span id="chat-topbar-title">Jarvis</span>
        <button id="theme-toggle" title="Toggle theme">☾</button>
      </div>
      <div id="messages-container"><div class="inner"></div></div>

      <div id="input-area">
        <div id="input-inner">
          <textarea id="message-input" rows="1" placeholder="Type a message..."></textarea>
          <button id="send-btn">Send →</button>
        </div>
      </div>
    </main>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
